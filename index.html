<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>投标导航 | 分类标签 · 云端备份</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ecece4;   /* 柔和的米灰基调，护眼不刺眼 */
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 28px 24px 48px;
            line-height: 1.5;
            color: #2c3e2f;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 通用卡片样式 */
        .card-panel {
            background: #fefaf5;
            border-radius: 32px;
            border: 1px solid #e2dcd0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
        }

        /* 头部 */
        .top-header {
            background: #fefaf5;
            border-radius: 32px;
            padding: 20px 28px;
            margin-bottom: 24px;
            border: 1px solid #e2dcd0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 14px;
        }

        .logo {
            font-size: 1.65rem;
            font-weight: 620;
            background: linear-gradient(135deg, #4f6b4a, #6e8c6a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .date-area {
            font-size: 0.85rem;
            color: #6f6a5c;
            background: #f3efe8;
            padding: 6px 14px;
            border-radius: 60px;
        }

        .search-engine {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f3efe8;
            padding: 5px 12px;
            border-radius: 60px;
            border: 1px solid #e2dcd0;
        }

        .search-engine select {
            border: none;
            background: transparent;
            font-size: 0.85rem;
            font-weight: 500;
            color: #4a5a45;
            cursor: pointer;
            outline: none;
        }

        .search-engine input {
            border: none;
            background: transparent;
            padding: 8px 0;
            width: 200px;
            font-size: 0.9rem;
            outline: none;
            color: #2c3e2f;
        }

        .search-engine input::placeholder {
            color: #b2aa98;
        }

        .search-engine button {
            background: #6e8c6a;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-engine button:hover {
            background: #5c7858;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-outline {
            background: #fefaf5;
            border: 1px solid #d9d0c0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #4a5a45;
            transition: 0.2s;
        }

        .btn-outline:hover {
            background: #f3efe8;
            border-color: #bcb09b;
            color: #3b5a37;
        }

        /* 标签栏 */
        .tag-manager {
            background: #fefaf5;
            border-radius: 32px;
            padding: 16px 24px;
            margin-bottom: 24px;
            border: 1px solid #e2dcd0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            justify-content: space-between;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .tag-item {
            background: #f3efe8;
            border-radius: 60px;
            padding: 6px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #e2dcd0;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag-item.active {
            background: #6e8c6a;
            color: white;
            border-color: #6e8c6a;
        }

        .tag-item .edit-tag,
        .tag-item .del-tag {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            color: inherit;
            opacity: 0.6;
            transition: 0.2s;
        }

        .tag-item .edit-tag:hover,
        .tag-item .del-tag:hover {
            opacity: 1;
        }

        .tag-actions .btn-tag {
            background: #f3efe8;
            border: 1px solid #d9d0c0;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .tag-actions .btn-tag:hover {
            background: #e6dfd4;
        }

        /* 搜索定位 + 排序栏 */
        .search-locate {
            background: #fefaf5;
            border-radius: 60px;
            padding: 12px 22px;
            margin-bottom: 28px;
            border: 1px solid #e2dcd0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .search-locate .search-input {
            flex: 1;
            min-width: 180px;
        }

        .search-locate input {
            width: 100%;
            padding: 8px 16px;
            border-radius: 60px;
            border: 1px solid #e2dcd0;
            background: white;
            font-size: 0.85rem;
            outline: none;
            color: #2c3e2f;
        }

        .search-locate input:focus {
            border-color: #a6b89f;
        }

        .search-locate button {
            background: #f3efe8;
            border: none;
            padding: 8px 24px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            color: #4a5a45;
            transition: 0.2s;
        }

        .search-locate button:hover {
            background: #e6dfd4;
            color: #3b5a37;
        }

        .sort-buttons {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .sort-btn {
            background: #fefaf5;
            border: 1px solid #d9d0c0;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4a5a45;
        }

        .sort-btn.active {
            background: #6e8c6a;
            color: white;
            border-color: #6e8c6a;
        }

        .sort-btn:hover {
            background: #e6dfd4;
            border-color: #bcb09b;
        }

        /* 备份区域 */
        .backup-section {
            background: #fefaf5;
            border-radius: 32px;
            padding: 20px 24px;
            margin-top: 32px;
            border: 1px solid #e2dcd0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            justify-content: space-between;
        }

        .cloud-backup,
        .local-backup {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: #f3efe8;
            padding: 8px 20px;
            border-radius: 60px;
        }

        .cloud-backup input {
            border: 1px solid #d9d0c0;
            border-radius: 60px;
            padding: 8px 16px;
            font-size: 0.85rem;
            width: 200px;
            outline: none;
            background: white;
            color: #2c3e2f;
        }

        .cloud-backup button,
        .local-backup button {
            background: white;
            border: 1px solid #d9d0c0;
            padding: 6px 18px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            color: #4a5a45;
        }

        .cloud-backup button:hover,
        .local-backup button:hover {
            background: #e6dfd4;
            border-color: #bcb09b;
        }

        .random-key-btn {
            background: #f3efe8;
            border: none;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .edit-mode-bar {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .edit-mode-btn,
        .delete-mode-btn {
            background: #6e8c6a;
            color: white;
            border: none;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .edit-mode-btn:hover,
        .delete-mode-btn:hover {
            background: #5c7858;
        }

        .edit-mode-btn.active,
        .delete-mode-btn.active {
            background: #c47b5e;
        }

        /* 网站卡片网格 */
        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 20px;
            margin: 16px 0 8px;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 14px 20px;
            border: 1px solid #ece3d8;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px -12px rgba(0, 0, 0, 0.1);
            border-color: #cfc5b4;
            background: #fffefa;
        }

        .card.selected {
            background: #eef5ea;
            border-color: #8caa87;
            box-shadow: 0 0 0 2px #8caa87 inset;
        }

        .card.highlight {
            background: #fff0e0;
            border-left: 4px solid #c47b5e;
        }

        .drag-handle {
            cursor: grab;
            color: #b6aa94;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .site-name-link {
            font-weight: 600;
            font-size: 0.95rem;
            color: #2d4630;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            letter-spacing: -0.2px;
        }

        .site-name-link:hover {
            color: #6e8c6a;
            text-decoration: underline;
        }

        .site-tag-select {
            background: #f3efe8;
            border: 1px solid #e2dcd0;
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 0.7rem;
            outline: none;
            cursor: pointer;
            flex-shrink: 0;
            color: #3b5a37;
        }

        .empty-state {
            text-align: center;
            padding: 56px 20px;
            background: #fefaf5;
            border-radius: 48px;
            color: #b2aa98;
            border: 1px dashed #ddd2c2;
        }

        .toast-msg {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #2d3e2a;
            color: #fefaf5;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
        }

        .toast-msg.show {
            opacity: 1;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 47, 0.4);
            backdrop-filter: blur(2px);
            align-items: center;
            justify-content: center;
            z-index: 1050;
        }

        .modal-content {
            background: #fefaf5;
            border-radius: 40px;
            max-width: 500px;
            width: 90%;
            padding: 32px;
            border: 1px solid #e2dcd0;
            box-shadow: 0 30px 40px -20px rgba(0, 0, 0, 0.2);
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #6f6a5c;
            display: block;
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #e2dcd0;
            background: white;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #8caa87;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 28px;
        }

        .btn-secondary {
            background: #f3efe8;
            border: 1px solid #d9d0c0;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            color: #4a5a45;
        }

        .btn-primary {
            background: #6e8c6a;
            border: none;
            color: white;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #5c7858;
        }

        .btn-secondary:hover {
            background: #e6dfd4;
        }

        @media (max-width: 680px) {
            body {
                padding: 16px;
            }

            .top-header,
            .tag-manager,
            .search-locate,
            .backup-section {
                padding: 16px;
            }

            .sites-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 头部 -->
    <div class="top-header">
        <div class="logo-area">
            <div class="logo"><i class="fas fa-gavel"></i> 投标·导航仪</div>
            <div class="date-area" id="liveDate"></div>
        </div>
        <div class="search-engine">
            <select id="engineSelect"><option value="baidu">百度</option><option value="bing">必应</option><option value="google">谷歌</option></select>
            <input type="text" id="searchKeywordEngine" placeholder="搜索招标资讯...">
            <button id="engineSearchBtn"><i class="fas fa-search"></i> 搜</button>
        </div>
        <div class="action-buttons">
            <label class="btn-outline" for="importFileInput"><i class="fas fa-upload"></i> 导入收藏夹</label>
            <input type="file" id="importFileInput" accept=".htm,.html" style="display: none;">
            <button id="openAddSiteModalBtn" class="btn-outline"><i class="fas fa-plus-circle"></i> 添加网站</button>
            <button id="resetExampleBtn" class="btn-outline"><i class="fas fa-database"></i> 重置示例</button>
        </div>
    </div>

    <!-- 标签管理栏 -->
    <div class="tag-manager">
        <div class="tag-list" id="tagListContainer"></div>
        <div class="tag-actions">
            <button id="addTagBtn" class="btn-tag"><i class="fas fa-tag"></i> 新建标签</button>
            <button id="manageTagsBtn" class="btn-tag"><i class="fas fa-cog"></i> 管理标签</button>
        </div>
    </div>

    <!-- 查找栏 + 排序按钮 -->
    <div class="search-locate">
        <div class="search-input"><input type="text" id="searchKeyword" placeholder="输入网站名称关键字，快速定位"></div>
        <button id="searchBtn">定位高亮</button>
        <button id="clearHighlightBtn">清除高亮</button>
        <div class="sort-buttons">
            <button id="sortByNameBtn" class="sort-btn"><i class="fas fa-sort-alpha-down"></i> 按首字母</button>
            <button id="sortByFreqBtn" class="sort-btn"><i class="fas fa-chart-line"></i> 按使用频率</button>
        </div>
    </div>

    <!-- 网站卡片列表 -->
    <div id="sitesGridContainer" class="sites-grid"></div>

    <!-- 备份区域 -->
    <div class="backup-section">
        <div class="cloud-backup">
            <i class="fas fa-cloud-upload-alt" style="color:#6e8c6a;"></i>
            <input type="text" id="cloudKey" placeholder="主KEY (6-60位)" maxlength="60">
            <button id="backupToCloudBtn"><i class="fas fa-upload"></i> 分片备份</button>
            <button id="restoreFromCloudBtn"><i class="fas fa-download"></i> 分片恢复</button>
            <button id="genRandomKeyBtn" class="random-key-btn">随机KEY</button>
        </div>
        <div class="local-backup">
            <i class="fas fa-hdd" style="color:#6e8c6a;"></i>
            <button id="backupToLocalBtn"><i class="fas fa-file-download"></i> 备份本地</button>
            <button id="restoreFromLocalBtn"><i class="fas fa-file-upload"></i> 恢复本地</button>
            <input type="file" id="localRestoreFile" accept=".json" style="display: none;">
        </div>
        <div class="edit-mode-bar">
            <button id="editModeBtn" class="edit-mode-btn">编辑</button>
            <button id="deleteModeBtn" class="delete-mode-btn">删除</button>
        </div>
    </div>
</div>

<!-- 添加网站弹窗 -->
<div id="addSiteModal" class="modal"><div class="modal-content"><h3 style="margin-bottom: 16px;"><i class="fas fa-plus-circle"></i> 添加投标网站</h3>
    <div class="input-group"><label>网址 URL *</label><input type="text" id="modalAddUrl" placeholder="https://..."></div>
    <div class="input-group"><label>网站名称</label><input type="text" id="modalAddName" placeholder="自动获取或手动填写"></div>
    <div class="input-group"><label>所属标签</label><select id="modalTagSelect"></select></div>
    <div style="margin-bottom: 16px;"><button id="modalFetchInfoBtn" class="btn-secondary" style="width:100%;">🌐 获取网页标题</button></div>
    <div class="modal-buttons"><button id="closeModalBtn" class="btn-secondary">取消</button><button id="modalAddSiteBtn" class="btn-primary">添加</button></div>
</div></div>

<!-- 编辑网站弹窗 -->
<div id="editModal" class="modal"><div class="modal-content"><h3 style="margin-bottom: 16px;"><i class="fas fa-pen-alt"></i> 编辑站点</h3>
    <div class="input-group"><label>网站名称</label><input type="text" id="editName"></div>
    <div class="input-group"><label>网址 URL</label><input type="text" id="editUrl"></div>
    <div class="input-group"><label>所属标签</label><select id="editTagSelect"></select></div>
    <div class="modal-buttons"><button id="closeEditModalBtn" class="btn-secondary">取消</button><button id="saveEditBtn" class="btn-primary">保存</button></div>
</div></div>

<!-- 管理标签弹窗 -->
<div id="manageTagsModal" class="modal"><div class="modal-content"><h3><i class="fas fa-tags"></i> 管理标签</h3>
    <div id="tagsManageList" style="max-height: 320px; overflow-y: auto; margin: 20px 0;"></div>
    <div class="modal-buttons"><button id="closeManageTagsBtn" class="btn-secondary">关闭</button></div>
</div></div>

<div id="toastMsg" class="toast-msg"></div>

<script>
    // ---------- 数据 ----------
    let sites = [];
    let tags = [];
    let editId = null;
    let sortableInstance = null;
    let currentSearchKeyword = "";
    let currentTagId = "all";
    let editMode = false;
    let deleteMode = false;
    let selectedIds = new Set();
    let currentSort = 'frequency';
    let clickCounts = {};

    const STORAGE_KEY = 'tender_nav_pro_sites';
    const TAGS_KEY = 'tender_nav_tags';
    const CLICK_COUNT_KEY = 'tender_nav_click_counts';

    function showToast(msg, duration = 2200) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }

    function saveToLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sites));
        localStorage.setItem(TAGS_KEY, JSON.stringify(tags));
    }

    function loadClickCounts() {
        const stored = localStorage.getItem(CLICK_COUNT_KEY);
        try { clickCounts = stored ? JSON.parse(stored) : {}; } catch(e) { clickCounts = {}; }
    }
    function saveClickCounts() { localStorage.setItem(CLICK_COUNT_KEY, JSON.stringify(clickCounts)); }
    function incrementClickCount(url) {
        clickCounts[url] = (clickCounts[url] || 0) + 1;
        saveClickCounts();
        if (currentSort === 'frequency') applySortAndRender();
    }

    function initTags() {
        const stored = localStorage.getItem(TAGS_KEY);
        if (stored) {
            try { tags = JSON.parse(stored); if (!Array.isArray(tags)) tags = []; } catch(e) { tags = []; }
        }
        if (!tags.length) {
            tags = [
                { id: "tag_default", name: "默认" },
                { id: "tag_gonggong", name: "公共资源" },
                { id: "tag_zhaobiao", name: "招标平台" }
            ];
        }
    }

    function loadDefaultSites() {
        const defaultTag = tags.find(t => t.name === "公共资源")?.id || tags[0]?.id;
        const platformTag = tags.find(t => t.name === "招标平台")?.id || tags[0]?.id;
        return [
            { id: Date.now() + 1, name: "衡水市公共资源交易中心", url: "http://hsggzy.hengshui.gov.cn/", tagId: defaultTag },
            { id: Date.now() + 2, name: "河北省公共资源交易中心", url: "http://ggzy.hebei.gov.cn/hbjyzx/", tagId: defaultTag },
            { id: Date.now() + 3, name: "E招冀成电子招标平台", url: "https://www.hebeibidding.com/", tagId: platformTag },
            { id: Date.now() + 4, name: "惠招标电子招投标平台", url: "http://www.hbidding.com/", tagId: platformTag },
            { id: Date.now() + 5, name: "招标通电子招投标平台", url: "http://www.hebztb.com/", tagId: platformTag }
        ];
    }

    function initData() {
        initTags();
        const storedSites = localStorage.getItem(STORAGE_KEY);
        if (storedSites) {
            try { sites = JSON.parse(storedSites); if (!Array.isArray(sites) || sites.length === 0) sites = loadDefaultSites(); } catch(e) { sites = loadDefaultSites(); }
        } else { sites = loadDefaultSites(); }
        sites.forEach(s => { if (!s.id) s.id = Date.now() + Math.floor(Math.random() * 100000); if (!s.tagId) s.tagId = tags[0]?.id || "default"; });
        loadClickCounts();
    }

    function deleteTagById(tagId) {
        if (tags.length <= 1) { showToast("至少保留一个标签", "warning"); return; }
        const tag = tags.find(t => t.id === tagId);
        if (!tag) return;
        if (confirm(`删除标签“${tag.name}”，其下网站将移至“默认”标签，确定吗？`)) {
            const defaultTag = tags.find(t => t.name === "默认") || tags[0];
            sites.forEach(s => { if (s.tagId === tagId) s.tagId = defaultTag.id; });
            tags = tags.filter(t => t.id !== tagId);
            if (currentTagId === tagId) currentTagId = "all";

            renderTagBar();
            renderSites();
            showToast(`已删除标签“${tag.name}”`);

    // 网站操作
    async function fetchWebsiteTitleFromUrl(rawUrl) {
        let fullUrl = rawUrl.trim();
        if (!fullUrl.startsWith('http')) fullUrl = 'https://' + fullUrl;
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(fullUrl)}`;
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            const response = await fetch(proxyUrl, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error();
            const html = await response.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            let title = doc.querySelector('title')?.innerText?.trim();
            if (title) return title.replace(/\s+/g, ' ').substring(0, 80);
            return null;
        } catch (err) {
            try { return new URL(fullUrl).hostname.replace(/^www\./, ''); } catch(e) { return null; }
        }
    }

    function reinitSortable() {
        if (sortableInstance) sortableInstance.destroy();
        const container = document.getElementById('sitesGridContainer');
        if (container && !editMode && !deleteMode && currentTagId === 'all') {
            sortableInstance = new Sortable(container, {
                handle: '.drag-handle',
                animation: 200,

                    const cards = document.querySelectorAll('.card');
                    const newOrder = [];
                    cards.forEach(card => {
                        const id = Number(card.dataset.id);

                    });
                    if (newOrder.length === sites.length) { sites = newOrder; saveToLocal(); if (currentSearchKeyword) performSearchAndLocate(); }

    function renderSites() {
        const container = document.getElementById('sitesGridContainer');
        if (!container) return;
        let filtered = currentTagId === 'all' ? sites : sites.filter(s => s.tagId === currentTagId);
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i><p>暂无网站，点击「添加网站」或导入收藏夹</p></div>`;
            if (!editMode && !deleteMode && currentTagId === 'all') reinitSortable();
            else if (sortableInstance) sortableInstance.destroy();
            return;
        }
        let html = '';
        filtered.forEach(site => {
            const selectedClass = (deleteMode && selectedIds.has(site.id)) ? 'selected' : '';
            html += `<div class="card ${selectedClass}" data-id="${site.id}">
                        <i class="fas fa-grip-vertical drag-handle"></i>
                        <a href="${escapeHtml(site.url)}" target="_blank" rel="noopener noreferrer" class="site-name-link" data-id="${site.id}" data-url="${escapeHtml(site.url)}" title="访问 ${escapeHtml(site.name)}">${escapeHtml(site.name)}</a>
                        <select class="site-tag-select" data-id="${site.id}">
                            ${tags.map(t => `<option value="${t.id}" ${t.id === site.tagId ? 'selected' : ''}>${escapeHtml(t.name)}</option>`).join('')}
                        </select>
                    </div>`;
        });
        container.innerHTML = html;
        // 绑定卡片交互
        document.querySelectorAll('.card').forEach(card => {
            const id = Number(card.dataset.id);
            const link = card.querySelector('.site-name-link');
            if (link && (editMode || deleteMode)) {
                const newLink = link.cloneNode(true);
                link.parentNode.replaceChild(newLink, link);
                newLink.addEventListener('click', (e) => { e.preventDefault(); if (editMode) openEditModalById(id); else if (deleteMode) toggleDeleteSelection(id); });
            } else if (link && !editMode && !deleteMode) {
                link.addEventListener('click', (e) => { incrementClickCount(link.getAttribute('data-url')); });

                if (e.target.closest('.site-name-link') || e.target.closest('.site-tag-select')) return;
                if (editMode) openEditModalById(id);
                else if (deleteMode) toggleDeleteSelection(id);

            const tagSelect = card.querySelector('.site-tag-select');
            tagSelect?.addEventListener('change', (e) => {
                e.stopPropagation();
                const site = sites.find(s => s.id === id);
                if (site && site.tagId !== tagSelect.value) { site.tagId = tagSelect.value; saveToLocal(); renderSites(); showToast(`已移动至 ${tags.find(t => t.id === tagSelect.value)?.name}`); }
            });
        });
        if (currentSearchKeyword) performSearchAndLocate();
        if (!editMode && !deleteMode && currentTagId === 'all') reinitSortable();
        else if (sortableInstance) sortableInstance.destroy();
    }

    // 导入收藏夹
    async function importBookmarksFromHtml(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const doc = new DOMParser().parseFromString(e.target.result, 'text/html');
                const links = doc.querySelectorAll('a');
                if (links.length === 0) reject('未找到链接');
                const newSites = [], existing = new Set(sites.map(s => s.url));
                const defaultTag = tags[0]?.id;
                for (let link of links) {
                    let href = link.getAttribute('href');
                    let title = link.textContent?.trim() || link.getAttribute('title') || '';
                    if (!href || (!href.startsWith('http') && !href.startsWith('https'))) continue;
                    if (!title) try { title = new URL(href).hostname; } catch(e) { title = '导入站点'; }
                    if (!existing.has(href)) {
                        newSites.push({ id: Date.now() + Math.random() * 10000 + newSites.length, name: title.substring(0, 100), url: href, tagId: defaultTag });
                        existing.add(href);
                    }
                }
                resolve(newSites);
            };
            reader.onerror = () => reject('文件读取失败');
            reader.readAsText(file, 'UTF-8');
        });
    }
    async function handleImport(file) {
        if (!file) return;
        try {
            const imported = await importBookmarksFromHtml(file);
            if (!imported.length) { showToast('无新链接或格式无效', 2000); return; }
            sites.push(...imported);
            saveToLocal();
            applySortAndRender();
            showToast(`📥 成功导入 ${imported.length} 个站点`, 2000);
        } catch (e) { showToast('解析失败，请检查文件格式', 2500); }
    }

    // 云端备份 (分片稳定版)
    const MAX_VALUE_SIZE = 200000;
    async function writeTextDB(key, value) {
        const url = `https://textdb.online/update/?key=${encodeURIComponent(key)}&value=${encodeURIComponent(value)}`;
        const resp = await fetch(url, { method: 'POST' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        if (json.status !== 1) throw new Error(`API返回失败`);
        return json;
    }
    async function readTextDB(key) {
        const resp = await fetch(`https://textdb.online/${encodeURIComponent(key)}`, { method: 'GET' });
        if (!resp.ok) return null;
        return await resp.text() || null;
    }
    async function backupToCloud() {
        const masterKey = document.getElementById('cloudKey').value.trim();
        if (!/^[0-9a-zA-Z\-_]{6,60}$/.test(masterKey)) { showToast('主KEY格式无效', 3000); return; }
        const data = { sites, tags, clickCounts };
        const dataStr = JSON.stringify(data);
        const totalLen = dataStr.length;
        const btn = document.getElementById('backupToCloudBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 备份中...';
        try {
            if (totalLen <= MAX_VALUE_SIZE) {
                await writeTextDB(masterKey, dataStr);
                showToast('✅ 云端备份成功 (单片)', 2000);
            } else {
                const CHUNK_SIZE = 180000;
                const batchCount = Math.ceil(totalLen / CHUNK_SIZE);
                await writeTextDB(masterKey, JSON.stringify({ batches: batchCount }));
                for (let i = 0; i < batchCount; i++) {
                    const start = i * CHUNK_SIZE;
                    const end = Math.min(start + CHUNK_SIZE, totalLen);
                    const chunk = dataStr.substring(start, end);
                    await writeTextDB(`${masterKey}_batch${i}`, chunk);
                }
                showToast(`✅ 云端备份成功 (分${batchCount}片)`, 3000);
            }
        } catch (err) { showToast(`❌ 云端备份失败: ${err.message}`, 4000); backupToLocal(); }
        finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-upload"></i> 分片备份'; }
    }
    async function restoreFromCloud() {
        const masterKey = document.getElementById('cloudKey').value.trim();
        if (!/^[0-9a-zA-Z\-_]{6,60}$/.test(masterKey)) { showToast('主KEY格式不正确', 3000); return; }
        const btn = document.getElementById('restoreFromCloudBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 恢复中...';
        try {
            const masterData = await readTextDB(masterKey);
            if (!masterData) { showToast('云端无数据', 3000); return; }
            let fullData = '';
            if (masterData.trim().startsWith('{') && masterData.includes('"batches"')) {
                let meta; try { meta = JSON.parse(masterData); } catch(e) { meta = null; }
                if (meta && meta.batches) {
                    const chunks = [];
                    for (let i = 0; i < meta.batches; i++) {
                        const chunk = await readTextDB(`${masterKey}_batch${i}`);
                        if (chunk === null) throw new Error(`缺少分片 _batch${i}`);
                        chunks.push(chunk);
                    }
                    fullData = chunks.join('');
                } else fullData = masterData;
            } else fullData = masterData;
            if (!fullData) throw new Error('数据为空');
            const restored = JSON.parse(fullData);
            if (restored.sites && Array.isArray(restored.sites) && restored.tags && Array.isArray(restored.tags)) {
                if (confirm(`从云端恢复将覆盖当前所有网站和标签，确定吗？`)) {
                    sites = restored.sites;
                    tags = restored.tags;
                    if (restored.clickCounts) clickCounts = restored.clickCounts;
                    saveToLocal();
                    saveClickCounts();
                    renderTagBar();
                    applySortAndRender();
                    showToast(`🌐 已从云端恢复 ${sites.length} 个站点`, 2000);
                }
            } else throw new Error('数据结构不完整');
        } catch (err) { showToast(`恢复失败: ${err.message}`, 4000); }
        finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-download"></i> 分片恢复'; }
    }
    function generateRandomKey() {
        const chars = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ-_';
        let result = '';
        for (let i = 0; i < 20; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('cloudKey').value = result;
        showToast('已生成随机KEY', 1500);
    }
    function backupToLocal() {
        const data = { sites, tags, clickCounts };
        const dataStr = JSON.stringify(data, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `tender_backup_${new Date().toISOString().slice(0, 19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('✅ 已备份到本地', 1500);
    }
    function triggerLocalRestore() { document.getElementById('localRestoreFile').click(); }
    function handleLocalRestore(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const restored = JSON.parse(e.target.result);
                if (restored.sites && Array.isArray(restored.sites) && restored.tags && Array.isArray(restored.tags)) {
                    if (confirm(`从本地恢复将覆盖当前所有网站和标签，确定吗？`)) {
                        sites = restored.sites;
                        tags = restored.tags;
                        if (restored.clickCounts) clickCounts = restored.clickCounts;
                        saveToLocal();
                        saveClickCounts();
                        renderTagBar();
                        applySortAndRender();
                        showToast(`📁 已从本地恢复 ${sites.length} 个站点`, 2000);
                    }
                } else throw new Error('文件格式错误');
            } catch (err) { showToast('恢复失败：文件解析错误', 3000); }
        };
        reader.readAsText(file);
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function updateDate() { document.getElementById('liveDate').innerHTML = `<i class="far fa-calendar-alt"></i> ${new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'numeric', day: 'numeric', weekday: 'short' })}`; }
    setInterval(updateDate, 60000); updateDate();

    function bindEvents() {
        document.getElementById('openAddSiteModalBtn').addEventListener('click', openAddModal);
        document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('addSiteModal').style.display = 'none');
        document.getElementById('modalAddSiteBtn').addEventListener('click', addSiteFromModal);
        document.getElementById('modalFetchInfoBtn').addEventListener('click', modalAutoFill);
        window.addEventListener('click', e => { if (e.target === document.getElementById('addSiteModal')) closeAddModal(); if (e.target === document.getElementById('editModal')) closeEditModal(); if (e.target === document.getElementById('manageTagsModal')) document.getElementById('manageTagsModal').style.display = 'none'; });
        document.getElementById('closeEditModalBtn').addEventListener('click', closeEditModal);
        document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
        document.getElementById('importFileInput').addEventListener('change', e => { if (e.target.files.length) handleImport(e.target.files[0]); e.target.value = ''; });
        document.getElementById('resetExampleBtn').addEventListener('click', resetToExample);
        document.getElementById('searchBtn').addEventListener('click', performSearchAndLocate);
        document.getElementById('clearHighlightBtn').addEventListener('click', clearHighlight);
        document.getElementById('searchKeyword').addEventListener('keypress', e => { if (e.key === 'Enter') performSearchAndLocate(); });
        initSearchEngine();
        document.getElementById('backupToCloudBtn').addEventListener('click', backupToCloud);
        document.getElementById('restoreFromCloudBtn').addEventListener('click', restoreFromCloud);
        document.getElementById('genRandomKeyBtn').addEventListener('click', generateRandomKey);
        document.getElementById('backupToLocalBtn').addEventListener('click', backupToLocal);
        document.getElementById('restoreFromLocalBtn').addEventListener('click', triggerLocalRestore);
        document.getElementById('localRestoreFile').addEventListener('change', e => { if (e.target.files.length) handleLocalRestore(e.target.files[0]); e.target.value = ''; });
        document.getElementById('addTagBtn').addEventListener('click', addNewTag);
        document.getElementById('manageTagsBtn').addEventListener('click', showManageTags);
        document.getElementById('closeManageTagsBtn').addEventListener('click', () => document.getElementById('manageTagsModal').style.display = 'none');

        const editBtn = document.getElementById('editModeBtn');
        const delBtn = document.getElementById('deleteModeBtn');
        editBtn.addEventListener('click', () => { if (editMode) exitEditMode(); else enterEditMode(); });
        delBtn.addEventListener('click', () => { if (deleteMode) { if (selectedIds.size > 0) confirmDeleteSelected(); else exitDeleteMode(true); } else enterDeleteMode(); });

        const sortByName = document.getElementById('sortByNameBtn');
        const sortByFreq = document.getElementById('sortByFreqBtn');
        sortByName.addEventListener('click', () => { currentSort = 'name'; sortByName.classList.add('active'); sortByFreq.classList.remove('active'); applySortAndRender(); });
        sortByFreq.addEventListener('click', () => { currentSort = 'frequency'; sortByFreq.classList.add('active'); sortByName.classList.remove('active'); applySortAndRender(); });
        if (currentSort === 'frequency') { sortByFreq.classList.add('active'); sortByName.classList.remove('active'); }
        else { sortByName.classList.add('active'); sortByFreq.classList.remove('active'); }
    }

    initData();
    bindEvents();
    sortSitesBy(currentSort);
    renderTagBar();
    renderSites();
</script>
</body>
</html>
